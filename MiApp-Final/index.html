<!DOCTYPE html><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi App Tecnológica</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="contenedor-app">
    <header class="mi-header">
        <h1>Panel de Control</h1>
    </header>
    <section class="seccion-media">

  <img src="imagenes/Cortis.jpg" alt="Imagen de mi proyecto" class="img-fluida">
  
</section>
    
    <main class="contenido">
        <p>Selecciona una opción para continuar:</p>
        
        <div class="grid-servicios">
            <div class="card" id="btn-reportar">
                <span class="icon">📌</span>
                <h3>Reportar Fallo</h3>
            </div>
            
            <div class="card" id="btn-manual">
                <span class="icon">📜</span>
                <h3>Ver Manual</h3>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
<section class="seccion-media">
  <div class="galeria-vertical">
    <img src="imagenes/Greengreen.jpg" alt="Foto 1 del proyecto" class="img-proyecto">
    <img src="imagenes/Hybe.jpg" alt="Foto 2 del proyecto" class="img-proyecto">
    <img src="imagenes/Poyoyoi.jpg" alt="Foto 3 del proyecto" class="img-proyecto">
  </div>
  
  <div class="video-contenedor">
    <iframe src="https://www.youtube.com/embed/qSYNCpb0Bzw?si=40WAHPbhnWfBSpqm" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
